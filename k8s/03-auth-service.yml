apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: noteflow
  labels:
    app: auth-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
    spec:
      initContainers:
        - name: wait-for-postgres
          image: postgres:16
          env:
            - name: POSTGRES_DB
              valueFrom:
                configMapKeyRef:
                  name: noteflow-config
                  key: POSTGRES_DB
            - name: POSTGRES_USER
              valueFrom:
                configMapKeyRef:
                  name: noteflow-config
                  key: POSTGRES_USER
          command:
            - /bin/sh
            - -c
            - until pg_isready -h postgres -p 5432 -U "$POSTGRES_USER" -d "$POSTGRES_DB"; do echo "Waiting for postgres"; sleep 2; done
      containers:
        - name: auth-service
          image: albertart10/noteflow-auth-service:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8001
          env:
            - name: AUTH_SERVICE_PORT
              value: "8001"
            - name: APP_NAME
              value: NoteFlow Auth Service
            - name: APP_VERSION
              value: 0.1.0
            - name: DEBUG
              value: "false"
            - name: DATABASE_HOST
              valueFrom:
                configMapKeyRef:
                  name: noteflow-config
                  key: DATABASE_HOST
            - name: DATABASE_PORT
              valueFrom:
                configMapKeyRef:
                  name: noteflow-config
                  key: DATABASE_PORT
            - name: DATABASE_NAME
              valueFrom:
                configMapKeyRef:
                  name: noteflow-config
                  key: POSTGRES_DB
            - name: DATABASE_USER
              valueFrom:
                configMapKeyRef:
                  name: noteflow-config
                  key: POSTGRES_USER
            - name: DATABASE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: noteflow-secret
                  key: POSTGRES_PASSWORD
            - name: JWT_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: noteflow-secret
                  key: JWT_SECRET_KEY
            - name: JWT_ALGORITHM
              value: HS256
            - name: ACCESS_TOKEN_EXPIRE_MINUTES
              value: "30"
          readinessProbe:
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 30
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: auth-service
  namespace: noteflow
spec:
  type: ClusterIP
  selector:
    app: auth-service
  ports:
    - name: http
      port: 8001
      targetPort: 8001
