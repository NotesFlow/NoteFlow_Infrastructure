apiVersion: apps/v1
kind: Deployment
metadata:
  name: notes-data-service
  namespace: noteflow
  labels:
    app: notes-data-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: notes-data-service
  template:
    metadata:
      labels:
        app: notes-data-service
    spec:
      initContainers:
        - name: wait-for-postgres
          image: postgres:16
          env:
            - name: POSTGRES_DB
              valueFrom:
                configMapKeyRef:
                  name: noteflow-config
                  key: POSTGRES_DB
            - name: POSTGRES_USER
              valueFrom:
                configMapKeyRef:
                  name: noteflow-config
                  key: POSTGRES_USER
          command:
            - /bin/sh
            - -c
            - until pg_isready -h postgres -p 5432 -U "$POSTGRES_USER" -d "$POSTGRES_DB"; do echo "Waiting for postgres"; sleep 2; done
      containers:
        - name: notes-data-service
          image: albertart10/noteflow-notes-data-service:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8003
          env:
            - name: NOTES_DATA_SERVICE_HOST
              value: 0.0.0.0
            - name: NOTES_DATA_SERVICE_PORT
              value: "8003"
            - name: DATABASE_HOST
              valueFrom:
                configMapKeyRef:
                  name: noteflow-config
                  key: DATABASE_HOST
            - name: DATABASE_PORT
              valueFrom:
                configMapKeyRef:
                  name: noteflow-config
                  key: DATABASE_PORT
            - name: DATABASE_NAME
              valueFrom:
                configMapKeyRef:
                  name: noteflow-config
                  key: POSTGRES_DB
            - name: DATABASE_USER
              valueFrom:
                configMapKeyRef:
                  name: noteflow-config
                  key: POSTGRES_USER
            - name: DATABASE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: noteflow-secret
                  key: POSTGRES_PASSWORD
          readinessProbe:
            httpGet:
              path: /health
              port: 8003
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 8003
            initialDelaySeconds: 30
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: notes-data-service
  namespace: noteflow
spec:
  type: ClusterIP
  selector:
    app: notes-data-service
  ports:
    - name: http
      port: 8003
      targetPort: 8003
