apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: noteflow

spec:
  replicas: 2

  selector:
    matchLabels:
      app: auth-service

  template:
    metadata:
      labels:
        app: auth-service

    spec:
      containers:
        - name: auth-service
          image: noteflow/auth-service:latest
          imagePullPolicy: Never

          command: ["uvicorn"]
          args: ["app.main:app", "--host", "0.0.0.0", "--port", "8001"]

          ports:
            - containerPort: 8001

          env:
            - name: DATABASE_URL
              value: postgresql://noteflow_user:noteflow_pass@postgres:5432/noteflow

            - name: JWT_SECRET_KEY
              value: super_secret_jwt_key_123

            - name: AUTH_SERVICE_PORT
              value: "8001"

---
apiVersion: v1
kind: Service
metadata:
  name: auth-service
  namespace: noteflow

spec:
  selector:
    app: auth-service

  ports:
    - port: 8001
      targetPort: 8001