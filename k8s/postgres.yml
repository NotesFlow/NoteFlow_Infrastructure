apiVersion: v1
kind: Secret
metadata:
  name: postgres-secret
  namespace: noteflow
type: Opaque
stringData:
  POSTGRES_DB: noteflow
  POSTGRES_USER: noteflow_user
  POSTGRES_PASSWORD: noteflow_pass
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: noteflow
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16
          ports:
            - containerPort: 5432
          envFrom:
            - secretRef:
                name: postgres-secret
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: noteflow
spec:
  selector:
    app: postgres
  ports:
    - port: 5432
      targetPort: 5432