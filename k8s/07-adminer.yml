apiVersion: apps/v1
kind: Deployment
metadata:
  name: adminer
  namespace: noteflow
  labels:
    app: adminer
spec:
  replicas: 1
  selector:
    matchLabels:
      app: adminer
  template:
    metadata:
      labels:
        app: adminer
    spec:
      containers:
        - name: adminer
          image: adminer:4
          ports:
            - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: adminer
  namespace: noteflow
spec:
  type: NodePort
  selector:
    app: adminer
  ports:
    - name: http
      port: 8080
      targetPort: 8080
      nodePort: 30088

