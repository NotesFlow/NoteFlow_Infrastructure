apiVersion: apps/v1
kind: Deployment
metadata:
  name: notes-service
  namespace: noteflow

spec:
  replicas: 2

  selector:
    matchLabels:
      app: notes-service

  template:
    metadata:
      labels:
        app: notes-service

    spec:
      containers:
        - name: notes-service
          image: noteflow/notes-service:latest
          imagePullPolicy: Never

          command: ["uvicorn"]
          args: ["app.main:app", "--host", "0.0.0.0", "--port", "8002"]

          ports:
            - containerPort: 8002

          env:
            - name: AUTH_SERVICE_URL
              value: http://auth-service:8001

            - name: NOTES_DATA_SERVICE_URL
              value: http://notes-data-service:8003

            - name: NOTES_SERVICE_PORT
              value: "8002"

---
apiVersion: v1
kind: Service
metadata:
  name: notes-service
  namespace: noteflow

spec:
  selector:
    app: notes-service

  ports:
    - port: 8002
      targetPort: 8002