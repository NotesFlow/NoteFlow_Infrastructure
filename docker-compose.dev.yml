services:
  postgres:
    image: postgres:16
    container_name: noteflow-postgres
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - data_net

  auth-service:
    build:
      context: ../NoteFlow_Auth-service
    container_name: noteflow-auth-service
    restart: unless-stopped
    depends_on:
      - postgres
    environment:
      AUTH_SERVICE_PORT: ${AUTH_SERVICE_PORT}
      APP_NAME: NoteFlow Auth Service
      APP_VERSION: 0.1.0
      DEBUG: "false"
      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
      DATABASE_NAME: ${POSTGRES_DB}
      DATABASE_USER: ${POSTGRES_USER}
      DATABASE_PASSWORD: ${POSTGRES_PASSWORD}
      JWT_SECRET_KEY: change_this_to_a_long_random_secret_key_32_chars_min
      JWT_ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 30
    ports:
      - "${AUTH_SERVICE_PORT}:8001"
    networks:
      - app_net
      - data_net

  notes-data-service:
    build:
      context: ../NoteFlow_Notes-Data-service
    container_name: noteflow-notes-data-service
    restart: unless-stopped
    depends_on:
      - postgres
    environment:
      NOTES_DATA_SERVICE_HOST: 0.0.0.0
      NOTES_DATA_SERVICE_PORT: ${NOTES_DATA_SERVICE_PORT}
      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
      DATABASE_NAME: ${POSTGRES_DB}
      DATABASE_USER: ${POSTGRES_USER}
      DATABASE_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${NOTES_DATA_SERVICE_PORT}:8003"
    networks:
      - app_net
      - data_net

  notes-service:
    build:
      context: ../NoteFlow_Notes-service
    container_name: noteflow-notes-service
    restart: unless-stopped
    depends_on:
      - auth-service
      - notes-data-service
    environment:
      APP_NAME: NoteFlow Notes Service
      APP_VERSION: 0.1.0
      DEBUG: "false"
      NOTES_SERVICE_HOST: 0.0.0.0
      NOTES_SERVICE_PORT: ${NOTES_SERVICE_PORT}
      AUTH_SERVICE_URL: http://auth-service:8001
      NOTES_DATA_SERVICE_URL: http://notes-data-service:8003
      REQUEST_TIMEOUT_SECONDS: 5.0
    ports:
      - "${NOTES_SERVICE_PORT}:8002"
    networks:
      - app_net

  kong:
    image: kong:3.8
    container_name: noteflow-kong
    restart: unless-stopped
    depends_on:
      - auth-service
      - notes-service
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /kong/declarative/kong.yml
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_ACCESS_LOG: /dev/stdout
      KONG_PROXY_ERROR_LOG: /dev/stderr
      KONG_ADMIN_ERROR_LOG: /dev/stderr
      KONG_ADMIN_LISTEN: 0.0.0.0:8001
    volumes:
      - ./kong/kong.yml:/kong/declarative/kong.yml:ro
    ports:
      - "${KONG_PROXY_PORT}:8000"
      - "${KONG_ADMIN_PORT}:8001"
    networks:
      - gateway_net
      - app_net

  adminer:
    image: adminer:4
    container_name: noteflow-adminer
    restart: unless-stopped
    depends_on:
      - postgres
    ports:
      - "${ADMINER_PORT}:8080"
    networks:
      - admin_net
      - data_net

  prometheus:
    image: prom/prometheus:v2.55.1
    container_name: noteflow-prometheus
    restart: unless-stopped
    depends_on:
      - auth-service
      - notes-service
      - notes-data-service
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.enable-lifecycle
    ports:
      - "${PROMETHEUS_PORT}:9090"
    networks:
      - monitoring_net
      - app_net

  grafana:
    image: grafana/grafana:11.3.1
    container_name: noteflow-grafana
    restart: unless-stopped
    depends_on:
      - prometheus
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "${GRAFANA_PORT}:3000"
    networks:
      - monitoring_net
      - admin_net

volumes:
  postgres_data:
  prometheus_data:
  grafana_data:

networks:
  gateway_net:
    driver: bridge
  app_net:
    driver: bridge
  data_net:
    driver: bridge
  monitoring_net:
    driver: bridge
  admin_net:
    driver: bridge
