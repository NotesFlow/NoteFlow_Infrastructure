name: Build and Push Docker Images

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push auth-service
        uses: docker/build-push-action@v6
        with:
          context: ./auth-service
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/noteflow-auth-service:latest

      - name: Build and push notes-service
        uses: docker/build-push-action@v6
        with:
          context: ./notes-service
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/noteflow-notes-service:latest

      - name: Build and push notes-data-service
        uses: docker/build-push-action@v6
        with:
          context: ./notes-data-service
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/noteflow-notes-data-service:latest